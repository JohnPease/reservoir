name: Reservoir
options:
  bundleIdPrefix: com.johnpease
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  Reservoir:
    type: application
    platform: iOS
    sources:
      - path: Reservoir
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johnpease.Reservoir
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
  ReservoirTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReservoirTests
    dependencies:
      - target: Reservoir
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ReservoirUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ReservoirUITests
    dependencies:
      - target: Reservoir
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Reservoir:
    build:
      targets:
        Reservoir: all
        ReservoirTests: [test]
        ReservoirUITests: [test]
    test:
      targets:
        - ReservoirTests
        - ReservoirUITests
